# HDFS NameNode - StatefulSet + Headless Service
apiVersion: v1
kind: Service
metadata:
  name: hdfs-namenode
  namespace: hadoop-lab
  labels:
    app: hdfs-namenode
spec:
  clusterIP: None
  selector:
    app: hdfs-namenode
  ports:
    - name: rpc
      port: 9000
      targetPort: 9000
    - name: web
      port: 9870
      targetPort: 9870
---
apiVersion: v1
kind: Service
metadata:
  name: hdfs-namenode-external
  namespace: hadoop-lab
  labels:
    app: hdfs-namenode
spec:
  type: NodePort
  selector:
    app: hdfs-namenode
  ports:
    - name: web
      port: 9870
      targetPort: 9870
      nodePort: 30870
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hdfs-namenode
  namespace: hadoop-lab
  labels:
    app: hdfs-namenode
spec:
  serviceName: hdfs-namenode
  replicas: 1
  selector:
    matchLabels:
      app: hdfs-namenode
  template:
    metadata:
      labels:
        app: hdfs-namenode
    spec:
      nodeSelector:
        kubernetes.io/hostname: k3s-worker-1
      containers:
        - name: namenode
          image: hadoop-lab:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: HADOOP_ROLE
              value: namenode
          ports:
            - containerPort: 9000
              name: rpc
            - containerPort: 9870
              name: web
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          volumeMounts:
            - name: hadoop-config
              mountPath: /opt/hadoop/etc/hadoop/core-site.xml
              subPath: core-site.xml
            - name: hadoop-config
              mountPath: /opt/hadoop/etc/hadoop/hdfs-site.xml
              subPath: hdfs-site.xml
            - name: hadoop-config
              mountPath: /opt/hadoop/etc/hadoop/yarn-site.xml
              subPath: yarn-site.xml
            - name: hadoop-config
              mountPath: /opt/hadoop/etc/hadoop/mapred-site.xml
              subPath: mapred-site.xml
            - name: namenode-data
              mountPath: /data/hdfs/namenode
      volumes:
        - name: hadoop-config
          configMap:
            name: hadoop-config
  volumeClaimTemplates:
    - metadata:
        name: namenode-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 2Gi
